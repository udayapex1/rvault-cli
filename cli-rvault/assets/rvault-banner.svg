<svg width="1280" height="320" viewBox="0 0 1280 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#08010f"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- Star dots -->
  <circle cx="80" cy="40" r="1.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="200" cy="80" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="400" cy="30" r="2" fill="#ffffff" opacity="0.2"/>
  <circle cx="600" cy="60" r="1" fill="#ffffff" opacity="0.1"/>
  <circle cx="900" cy="25" r="1.5" fill="#ffffff" opacity="0.2"/>
  <circle cx="1100" cy="50" r="1" fill="#ffffff" opacity="0.15"/>
  <circle cx="1200" cy="90" r="2" fill="#ffffff" opacity="0.1"/>
  <circle cx="50" cy="200" r="1" fill="#ffffff" opacity="0.1"/>
  <circle cx="1240" cy="200" r="1.5" fill="#ffffff" opacity="0.15"/>
  <circle cx="700" cy="280" r="1" fill="#ffffff" opacity="0.1"/>
  <circle cx="1050" cy="270" r="1.5" fill="#ffffff" opacity="0.15"/>
  <circle cx="150" cy="270" r="1" fill="#ffffff" opacity="0.1"/>

  <!-- Terminal Logo Box -->
  <rect x="80" y="110" width="90" height="90" rx="16" fill="#0d0d0d" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Traffic lights -->
  <circle cx="100" cy="130" r="6" fill="#ff5f57"/>
  <circle cx="118" cy="130" r="6" fill="#febc2e"/>
  <circle cx="136" cy="130" r="6" fill="#28c840"/>
  <!-- Divider -->
  <line x1="82" y1="143" x2="168" y2="143" stroke="#1e1e1e" stroke-width="1.5"/>
  <!-- Prompt -->
  <text x="92" y="172" font-family="monospace" font-size="20" font-weight="700" fill="#00d4ff">❯</text>
  <text x="112" y="172" font-family="monospace" font-size="20" font-weight="600" fill="#ffffff">rv</text>
  <!-- Cursor -->
  <rect x="143" y="155" width="10" height="20" rx="2" fill="#00d4ff"/>

  <!-- rvault wordmark -->
  <text x="196" y="172" font-family="monospace" font-size="64" font-weight="700" fill="#ffffff">rvault</text>

  <!-- Tagline -->
  <text x="197" y="204" font-family="monospace" font-size="18" fill="#444444">Remote File Vault · CLI-first · Secure by design</text>

  <!-- Divider line -->
  <line x1="80" y1="228" x2="1200" y2="228" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Bottom badges -->
  <!-- npm -->
  <rect x="80" y="248" width="110" height="28" rx="6" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="92" y="267" font-family="monospace" font-size="12" fill="#444">npm</text>
  <text x="120" y="267" font-family="monospace" font-size="12" fill="#00d4ff">cli-rvault</text>

  <!-- version -->
  <rect x="204" y="248" width="80" height="28" rx="6" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="216" y="267" font-family="monospace" font-size="12" fill="#444">v</text>
  <text x="224" y="267" font-family="monospace" font-size="12" fill="#00ff88">1.0.0</text>

  <!-- license -->
  <rect x="298" y="248" width="72" height="28" rx="6" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <text x="310" y="267" font-family="monospace" font-size="12" fill="#444">MIT</text>
  <text x="334" y="267" font-family="monospace" font-size="12" fill="#ffffff">✓</text>

  <!-- status -->
  <rect x="384" y="248" width="110" height="28" rx="6" fill="#111111" stroke="#1e1e1e" stroke-width="1"/>
  <circle cx="398" cy="262" r="4" fill="#00ff88"/>
  <text x="410" y="267" font-family="monospace" font-size="12" fill="#444444">active dev</text>

  <!-- Right side author -->
  <text x="1200" y="267" font-family="monospace" font-size="13" fill="#333333" text-anchor="end">by @udayapex1</text>

</svg>
